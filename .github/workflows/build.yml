name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Build runners
        run: |
          npm run build --workspace=packages/runners/bash
          npm run build --workspace=packages/runners/http
          npm run build --workspace=packages/runners/cursor
          npm run build --workspace=packages/runners/claude-code
          npm run build --workspace=packages/runners/cursor-cli

      - name: Build cli and dashboard
        run: |
          npm run build --workspace=packages/cli
          npm run build --workspace=packages/dashboard

      - name: Lint dashboard
        run: npm run lint --workspace=dashboard
