name: Build Monorepo

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

env:
  APP_NAME: Wintermute
  BINARY_NAME: wntrmte
  VSCODE_QUALITY: stable

jobs:
  test-packages:
    name: Patchbay Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Build runners
        run: |
          npm run build --workspace=packages/runners/bash
          npm run build --workspace=packages/runners/http
          npm run build --workspace=packages/runners/cursor
          npm run build --workspace=packages/runners/claude-code
          npm run build --workspace=packages/runners/codex
          npm run build --workspace=packages/runners/cursor-cli
          npm run build --workspace=packages/runners/gemini

      - name: Build cli and server
        run: |
          npm run build --workspace=packages/server
          npm run build --workspace=packages/cli

      - name: Build dashboard
        run: npm run build --workspace=packages/dashboard

      - name: Lint dashboard
        run: npm run lint --workspace=packages/dashboard

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/dashboard

      - name: Run E2E tests
        run: npm run test:e2e

  test-extension:
    name: Wintermute Extension Tests
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ide/extensions/wntrmte-workflow
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'ide/.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:unit

  build-ide:
    needs: test-extension
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux
            vscode_arch: x64
          - os: macos-14
            os_name: osx
            vscode_arch: arm64
          - os: windows-2022
            os_name: windows
            vscode_arch: x64
    runs-on: ${{ matrix.os }}
    env:
      OS_NAME: ${{ matrix.os_name }}
      VSCODE_ARCH: ${{ matrix.vscode_arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'ide/.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os_name == 'linux'
        run: sudo apt-get update -y && sudo apt-get install -y libkrb5-dev

      - name: Install jq (Windows)
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          if ! command -v jq &> /dev/null; then
            curl -L -o /usr/bin/jq.exe https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-windows-amd64.exe
          fi

      - name: Build Wintermute
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ide
          bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wintermute-${{ matrix.os_name }}-${{ matrix.vscode_arch }}
          path: |
            ide/VSCode-linux-*/
            ide/VSCode-darwin-*/
            ide/VSCode-win32-*/
          retention-days: 7
