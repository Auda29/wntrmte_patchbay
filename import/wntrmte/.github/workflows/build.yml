name: Build Wintermute

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

env:
  APP_NAME: Wintermute
  BINARY_NAME: wntrmte
  VSCODE_QUALITY: stable

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: extensions/wntrmte-workflow
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux
            vscode_arch: x64
          - os: macos-14
            os_name: osx
            vscode_arch: arm64
          - os: windows-2022
            os_name: windows
            vscode_arch: x64
    runs-on: ${{ matrix.os }}
    env:
      OS_NAME: ${{ matrix.os_name }}
      VSCODE_ARCH: ${{ matrix.vscode_arch }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os_name == 'linux'
        run: sudo apt-get update -y && sudo apt-get install -y libkrb5-dev

      - name: Install jq (Windows)
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          if ! command -v jq &> /dev/null; then
            curl -L -o /usr/bin/jq.exe https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-windows-amd64.exe
          fi

      - name: Build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: wintermute-${{ matrix.os_name }}-${{ matrix.vscode_arch }}
          path: |
            VSCode-linux-*/
            VSCode-darwin-*/
            VSCode-win32-*/
          retention-days: 7
