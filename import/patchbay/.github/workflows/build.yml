name: Build Patchbay
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Build runners
        run: |
          npm run build --workspace=packages/runners/bash
          npm run build --workspace=packages/runners/http
          npm run build --workspace=packages/runners/cursor
          npm run build --workspace=packages/runners/claude-code
          npm run build --workspace=packages/runners/codex
          npm run build --workspace=packages/runners/cursor-cli
          npm run build --workspace=packages/runners/gemini

      - name: Build cli and server
        run: |
          npm run build --workspace=packages/server
          npm run build --workspace=packages/cli

      - name: Build dashboard
        run: npm run build --workspace=packages/dashboard

      - name: Lint dashboard
        run: npm run lint --workspace=packages/dashboard

      - name: Run unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/dashboard

      - name: Run E2E tests
        run: npm run test:e2e --workspace=packages/dashboard
